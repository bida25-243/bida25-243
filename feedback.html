<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <nav class="navbar navbar-expand-lg top-nav">
      <div class="container">
        <a class="navbar-brand brand-name d-flex align-items-center gap-2" href="index.html">
          <img src="Unravelled Safari Logo.jpg.png" alt="Safaris Unravelled logo">Safaris Unravelled</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
                  <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="nav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
            <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>
            <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
            <li class="nav-item"><a class="nav-link active" href="feedback.html">Feedback</a></li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <section class="hero-box">
    <article class="hero-words">
      <h1>FEEDBACK</h1>
      <p>Let us know how we did, so we can improve!</p>
    </article>
  </section>

  <main class="container my-5">

    <section class="row justify-content-center">
      <article class="col-md-8">

        <h2 class="sec-title">Feedback Form</h2>
        <p style="font-size:14px; color:#888; margin-bottom:24px;">
          Thank you for visiting. Please share your experience with us.
        </p>

        <form action="https://formspree.io/f/mnjwjgod" method="POST">

          <div class="row g-3">

            <article class="col-md-6">
              <label class="form-label" for="fb-name">Full Name *</label>
              <input class="form-field" type="text" id="fb-name" name="fb-name"
                placeholder="Enter your full name" required>
            </article>

            <article class="col-md-6">
              <label class="form-label" for="fb-email">Email Address</label>
              <input class="form-field" type="email" id="fb-email" name="fb-email"
                placeholder="Optional">
            </article>

            <article class="col-md-6">
              <label class="form-label" for="fb-date">Date of Visit *</label>
              <input class="form-field" type="date" id="fb-date" name="fb-date" required>
            </article>

            <article class="col-md-6">
              <label class="form-label" for="fb-service">Service Visited *</label>
              <select class="form-field" id="fb-service" name="fb-service" required>
                <option value="" disabled selected>Select a service</option>
                <option value="dining">Restaurant Dining</option>
                <option value="cakes">Cake Order</option>
                <option value="catering">Catering Service</option>
              </select>
            </article>

            <article class="col-12">
              <label class="form-label">Star Rating *</label>
              <div class="stars">
                <input type="radio" id="s5" name="rating" value="5" required>
                <label for="s5">&#9733;</label>
                <input type="radio" id="s4" name="rating" value="4">
                <label for="s4">&#9733;</label>
                <input type="radio" id="s3" name="rating" value="3">
                <label for="s3">&#9733;</label>
                <input type="radio" id="s2" name="rating" value="2">
                <label for="s2">&#9733;</label>
                <input type="radio" id="s1" name="rating" value="1">
                <label for="s1">&#9733;</label>
              </div>
            </article>

            <article class="col-12">
              <label class="form-label" for="fb-comment">Leave Your Comment *</label>
              <textarea class="form-field" id="fb-comment" name="fb-comment" rows="5" placeholder="Tell us about your experience..." required></textarea>
            </article>

            <article class="col-12">
              <label class="form-label" for="fb-recommend">Would you recommend us?</label>
              <select class="form-field" id="fb-recommend" name="fb-recommend">
                <option value="" disabled selected>Select an option</option>
                <option value="yes">Yes</option>
                <option value="maybe">Maybe</option>
                <option value="no">No</option>
              </select>
            </article>

            <article class="col-12">
              <button type="submit" class="send-btn">Submit Feedback</button>
            </article>
          </div>
        </form>
      </article>
    </section>

  </main>

  <footer class="page-footer">
    <p>Selebi Phikwe, Botswana | WhatsApp: +267 73905367 | &copy; 2026 Safaris Unravelled</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
